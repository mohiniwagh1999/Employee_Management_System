spring.application.name=mohini



spring.datasource.url=jdbc:mysql://localhost:3306/emission
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
server.servlet.context-path=/emr

# Directory where employee profile images will be stored (relative to project root)
employee.profile.images-dir=uploads/profile-images

# Optional: limit upload sizes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
