<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${employee.id} == null ? 'Add Employee' : 'Edit Employee'">Employee Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
</head>
<body class="bg-light">

<div th:replace="header :: body"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0" th:text="${employee.id} == null ? 'Add Employee' : 'Edit Employee'">Employee</h4>
                </div>
                <div class="card-body">
                
              
                    <form th:action="@{/employees/save}" th:object="${employee}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" th:field="*{profileImagePath}"/>

                        <div class="mb-3">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstName" th:field="*{firstName}" required>
                        </div>

                        <div class="mb-3">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastName" th:field="*{lastName}" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required>
                        </div>
                        
                         <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" required>
                        </div>

                        <div class="mb-3">
                            <label for="department" class="form-label">Department</label>
                            <input type="text" class="form-control" id="department" th:field="*{department}">
                        </div>

                        <div class="mb-3">
                            <label for="salary" class="form-label">Salary</label>
                            <input type="number" step="0.01" class="form-control" id="salary" th:field="*{salary}">
                        </div>

                        <div class="mb-3">
                            <label for="profileImageFile" class="form-label">Profile Image</label>
                            <input type="file" class="form-control" id="profileImageFile" name="profileImageFile" accept="image/*">
                            <div class="form-text">
                                Choose an image file to upload from your computer.
                            </div>
                            <div class="mt-2" th:if="*{profileImagePath} != null">
                                <span class="form-text d-block mb-1">Current image:</span>
                                <img th:src="@{${profileImagePath}}" alt="Current profile image"
                                     class="rounded-circle border"
                                     style="width:60px;height:60px;object-fit:cover;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="hireDate" class="form-label">Hire Date</label>
                            <input type="date" class="form-control" id="hireDate" th:field="*{hireDate}">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a class="btn btn-outline-secondary" th:href="@{/employees}">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>
</html>
