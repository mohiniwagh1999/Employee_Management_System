<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Profile</title>
   
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/employees}">Employee Management</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <div class="mb-3">
                        <img th:if="${employee.profileImagePath != null}"
                             th:src="@{${employee.profileImagePath}}"
                             alt="Profile picture"
                             class="rounded-circle border"
                             style="width:120px;height:120px;object-fit:cover;">
                        <div th:if="${employee.profileImagePath == null}" class="bg-secondary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                             style="width:120px;height:120px;font-size:40px;">
                            <span th:text="${#strings.substring(employee.firstName,0,1)}">E</span>
                        </div>
                    </div>

                    <h3 th:text="${employee.firstName + ' ' + employee.lastName}">Employee Name</h3>
                    <p class="text-muted mb-4" th:text="${employee.department}">Department</p>

                    <div class="text-start">
                        <p><strong>Email:</strong> <span th:text="${employee.email}">email@example.com</span></p>
                        <p><strong>Department:</strong> <span th:text="${employee.department}">IT</span></p>
                        <p><strong>Salary:</strong> <span th:text="${employee.salary}">50000</span></p>
                        <p><strong>Hire Date:</strong> <span th:text="${employee.hireDate}">2024-01-01</span></p>
                    </div>

                    <div class="mt-4 d-flex justify-content-between">
                        <a class="btn btn-outline-secondary" th:href="@{/employees}">Back to list</a>
                        <a class="btn btn-primary" th:href="@{'/employees/edit/' + ${employee.id}}">Edit Profile</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
