<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Management</title>
   
          <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>
<body >


<div th:replace="header :: body"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Employees</h2>
        <a class="btn btn-success" th:href="@{/employees/new}">Add Employee</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Photo</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Salary</th>
                        <th>Hire Date</th>
                        <th style="width: 260px;">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="employee : ${employees}">
                        <td th:text="${employee.id}">1</td>
                        <td>
                            <img th:if="${employee.profileImagePath != null}"
                                 th:src="@{${employee.profileImagePath}}"
                                 alt="Profile"
                                 class="rounded-circle"
                                 style="width:40px;height:40px;object-fit:cover;">
                        </td>
                        <td th:text="${employee.firstName}">First</td>
                        <td th:text="${employee.lastName}">Last</td>
                        <td th:text="${employee.email}">email@example.com</td>
                        <td th:text="${employee.department}">IT</td>
                        <td th:text="${employee.salary}">50000</td>
                        <td th:text="${employee.hireDate}">2024-01-01</td>
                        <td>
                            <a class="btn btn-sm btn-outline-secondary"
                               th:href="@{'/employees/profile/' + ${employee.id}}">Profile</a>
                            <a class="btn btn-sm btn-info ms-1 text-white"
                               th:href="@{'/leaves/employee/' + ${employee.id}}">Leaves</a>
                            <a class="btn btn-sm btn-primary ms-1"
                               th:href="@{'/employees/edit/' + ${employee.id}}">Edit</a>
                            <a class="btn btn-sm btn-outline-danger ms-1 mt-1 mt-sm-0"
                               th:href="@{'/employees/delete/' + ${employee.id}}"
                               onclick="return confirm('Are you sure you want to delete this employee?');">
                                Delete
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="8" class="text-center py-3">No employees found. Click "Add Employee" to create one.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>


</body>
</html>
