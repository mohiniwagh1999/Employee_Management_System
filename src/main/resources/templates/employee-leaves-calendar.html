<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Leave Calendar</title>
   
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
<div th:replace="header :: body"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-0">Leave Calendar</h2>
            <small class="text-muted"
                   th:text="${employee.firstName + ' ' + employee.lastName} + ' - ' + ${yearMonth}">Employee Name</small>
        </div>
        <a class="btn btn-outline-secondary"
           th:href="@{'/leaves/employee/' + ${employee.id}}">Back to List</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table mb-0">
                    <thead class="table-light">
                    <tr>
                        <th style="width: 150px;">Date</th>
                        <th>Leaves on this day</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="day : ${daysOfMonth}">
                        <td th:text="${day}">2024-03-01</td>
                        <td>
                            <div th:if="${#maps.containsKey(leavesByDate, day)}">
                                <div th:each="leave : ${leavesByDate[day]}">
                                    <span class="badge me-1"
                                          th:classappend="${leave.status == 'APPROVED'} ? ' bg-success' :
                                                          (${leave.status == 'REJECTED'} ? ' bg-danger' :
                                                          (${leave.status == 'CANCELLED'} ? ' bg-secondary' : ' bg-warning text-dark'))"
                                          th:text="${leave.type}">SICK</span>
                                    <span class="small text-muted">
                                        (<span th:text="${leave.status}">PENDING</span>:
                                        <span th:text="${leave.reason}">Reason</span>)
                                    </span>
                                </div>
                            </div>
                            <span th:if="${!#maps.containsKey(leavesByDate, day)}"
                                  class="text-muted small">No leave</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>


</body>
</html>
